version: '3.8'

services:
  app:
    build:
      context: ./docker/php
      dockerfile: Dockerfile.vite
    container_name: ticket_app
    volumes:
      - ./src:/var/www/html
    working_dir: /var/www/html
    depends_on:
      - db
    networks:
      - ticket_network

  webserver:
    image: nginx:alpine
    container_name: ticket_webserver
    ports:
      - "8000:80"
    volumes:
      - ./src:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - ticket_network

  db:
    image: mysql:8.0
    container_name: ticket_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ticket_booking
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: ticket_user
      MYSQL_PASSWORD: secret
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - ticket_network

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: ticket_phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
    depends_on:
      - db
    networks:
      - ticket_network

networks:
  ticket_network:
    driver: bridge

volumes:
  db_data:
